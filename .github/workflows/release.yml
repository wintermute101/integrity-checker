name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-package:
    name: Build - ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: integrity-checker-linux-latest-amd64
            ext: tar.xz
          - os: ubuntu-22.04
            asset_name: integrity-checker-linux-22.04-amd64
            ext: tar.xz
          - os: windows-latest
            asset_name: integrity-checker-windows-amd64
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build in release mode
        run: cargo build --release

      - name: Package for Linux
        if: runner.os == 'Linux'
        run: |
          cd target/release/
          tar cavf ${{ matrix.asset_name }}.${{ matrix.ext }} integrity-checker

      - name: Package for Windows
        if: runner.os == 'Windows'
        run: |
          cd target/release/
          7z a ${{ matrix.asset_name }}.${{ matrix.ext }} integrity-checker.exe

      - name: Upload temporary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/${{ matrix.asset_name }}.${{ matrix.ext }}

  publish-release:
    name: Publish GitHub Release
    needs: build-and-package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all temporary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release and Attach Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*